name: "Setup SSH Connection"
description: "Configures SSH key and known_hosts for Hostinger access"

inputs:
  ssh_key:
    description: "Private SSH key"
    required: true
  host:
    description: "Remote host"
    required: true
  port:
    description: "SSH port"
    required: true

runs:
  using: composite
  steps:
    - name: Initialize SSH directory
      shell: bash
      run: mkdir -p ~/.ssh && chmod 700 ~/.ssh

    - name: Inject private key
      shell: bash
      run: |
        echo "${{ inputs.ssh_key }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Add host to known_hosts
      shell: bash
      run: |
        ssh-keyscan -p ${{ inputs.port }} ${{ inputs.host }} >> ~/.ssh/known_hosts 2>/dev/null
