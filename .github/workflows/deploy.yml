name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RELEASES_DIR: ${{ secrets.HOSTINGER_DIR }}/releases
      CURRENT_DIR: ${{ secrets.HOSTINGER_DIR }}/current
      KEEP_RELEASES: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload release via rsync
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          rsync -az --delete --exclude='.git' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ env.RELEASES_DIR }}/$TIMESTAMP/

      - name: Activate release and run server tasks
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "
            set -e
            mkdir -p '${{ env.RELEASES_DIR }}'
            RELEASE='${{ env.RELEASES_DIR }}/'$TIMESTAMP
            # ensure release exists
            if [ ! -d \"\$RELEASE\" ]; then echo 'Release missing' >&2; exit 1; fi

            # put app into maintenance mode, run migrations and composer safely
            ln -sfn \"\$RELEASE\" '${{ env.CURRENT_DIR }}.tmp' &&
            # switch symlink atomically
            mv -T '${{ env.CURRENT_DIR }}.tmp' '${{ env.CURRENT_DIR }}' || true

            cd '${{ env.CURRENT_DIR }}'
            /opt/alt/php84/usr/bin/php artisan down --no-interaction || true
            /opt/alt/php84/usr/bin/php /usr/bin/composer install --no-dev --optimize-autoloader --no-interaction
            /opt/alt/php84/usr/bin/php artisan migrate --force --no-interaction
            /opt/alt/php84/usr/bin/php artisan up --no-interaction

            chmod -R 775 storage bootstrap/cache

            # cleanup old releases
            cd '${{ env.RELEASES_DIR }}'
            ls -1dt */ | tail -n +$(( ${{ env.KEEP_RELEASES }} + 1 )) | xargs -r rm -rf
          "

