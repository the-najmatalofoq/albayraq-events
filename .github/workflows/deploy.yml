name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          # printf preserves actual newlines; strips Windows CRLF artifacts
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Avoid ssh-keyscan entirely — use StrictHostKeyChecking=no instead
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.HOSTINGER_HOST }}
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              Port ${{ secrets.HOSTINGER_PORT }}
          EOF

      - name: Ensure remote target directory exists
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "mkdir -p ${{ secrets.HOSTINGER_DIR }}"

      - name: Rsync files to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.HOSTINGER_PORT }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DIR }}/

      - name: Run remote deployment commands
        env:
          DEPLOY_DIR: ${{ secrets.HOSTINGER_DIR }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.HOSTINGER_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "bash -s" <<ENDSSH
            set -e
            cd "${DEPLOY_DIR}"

            /opt/alt/php84/usr/bin/php artisan down --no-interaction || true

            /opt/alt/php84/usr/bin/php /usr/bin/composer install \
              --no-dev --optimize-autoloader --no-interaction

            /opt/alt/php84/usr/bin/php artisan migrate --force --no-interaction

            /opt/alt/php84/usr/bin/php artisan optimize:clear
            /opt/alt/php84/usr/bin/php artisan config:cache
            /opt/alt/php84/usr/bin/php artisan route:cache
            /opt/alt/php84/usr/bin/php artisan view:cache

            chmod -R 775 storage bootstrap/cache

            /opt/alt/php84/usr/bin/php artisan up --no-interaction || true
          ENDSSH
