name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Laravel Deployment Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📁 Initialize SSH
        run: |
          echo "Initializing SSH directory..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

      - name: 🔐 Add SSH private key
        run: |
          echo "Injecting private key..."
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: 📝 Add host to known_hosts
        run: |
          echo "Adding host to known_hosts..."
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: 🔍 Test SSH connection
        run: |
          echo "Testing SSH connection..."
          ssh -v -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "echo '✅ SSH OK: Connected to $(hostname)'"

      - name: 📁 Ensure remote directory
        run: |
          echo "Ensuring deployment directory exists..."
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "mkdir -p ${{ secrets.HOSTINGER_DIR }}"

      - name: 🔄 Rsync project files
        run: |
          echo "Syncing files to server..."
          rsync -az --delete \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude="storage/logs/*" \
            --exclude=".github" \
            --exclude="tests" \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DIR }}

      - name: 🚧 Enable maintenance mode
        run: |
          echo "Enabling maintenance mode..."
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "
            cd ${{ secrets.HOSTINGER_DIR }} && \
            php artisan down --retry=60 || true
          "

      - name: 📦 Install Composer dependencies
        run: |
          echo "Installing Composer dependencies..."
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "
            cd ${{ secrets.HOSTINGER_DIR }} && \
            composer install --no-dev --optimize-autoloader --no-interaction
          "

      - name: 🧱 Run migrations
        run: |
          echo "Running migrations..."
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "
            cd ${{ secrets.HOSTINGER_DIR }} && \
            php artisan migrate --force
          "

      - name: ⚡ Clear and rebuild caches
        run: |
          echo "Clearing and rebuilding caches..."
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "
            cd ${{ secrets.HOSTINGER_DIR }} && \
            php artisan optimize:clear && \
            php artisan config:cache && \
            php artisan route:cache && \
            php artisan view:cache
          "

      - name: 🔐 Fix permissions
        run: |
          echo "Setting correct permissions..."
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "
            cd ${{ secrets.HOSTINGER_DIR }} && \
            chmod -R 775 storage bootstrap/cache && \
            chown -R $(whoami):$(whoami) storage bootstrap/cache
          "

      - name: ✅ Disable maintenance mode
        run: |
          echo "Disabling maintenance mode..."
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "
            cd ${{ secrets.HOSTINGER_DIR }} && \
            php artisan up || true
          "

      - name: 🧪 Verify deployment
        run: |
          echo "Verifying deployment..."
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "
            cd ${{ secrets.HOSTINGER_DIR }} && \
            php artisan --version && \
            echo 'Deployment completed successfully!'
          "
