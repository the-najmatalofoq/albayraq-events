name: Deploy to Hostinger

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  verify-connection:
    name: 🔌 Verify SSH Connection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}

      - name: Test SSH connection
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "echo '✅ SSH OK — connected to $(hostname) — PHP: $(php -r \"echo PHP_VERSION;\")'"

  sync-files:
    name: 🔄 Sync Project Files
    runs-on: ubuntu-latest
    needs: verify-connection
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}

      - name: Ensure remote directory exists
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "mkdir -p ${{ secrets.HOSTINGER_DIR }}"

      - name: Rsync project files
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude="storage/logs/*" \
            --exclude=".github" \
            --exclude="tests" \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DIR }}

  maintenance-on:
    name: 🚧 Enable Maintenance Mode
    runs-on: ubuntu-latest
    needs: sync-files
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}

      - name: Enable maintenance mode
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && php artisan down --retry=60 || true"

  install-dependencies:
    name: 📦 Install Composer Dependencies
    runs-on: ubuntu-latest
    needs: maintenance-on
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}

      - name: Run composer install on server
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && \
             composer install --no-dev --optimize-autoloader --no-interaction"

  run-migrations:
    name: 🧱 Run Database Migrations
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}

      - name: Run migrations
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && php artisan migrate --force"

  optimize-app:
    name: ⚡ Optimize Application
    runs-on: ubuntu-latest
    needs: run-migrations
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}

      - name: Clear and rebuild caches
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && \
             php artisan optimize:clear && \
             php artisan config:cache && \
             php artisan route:cache"

  fix-permissions:
    name: 🔐 Fix File Permissions
    runs-on: ubuntu-latest
    needs: optimize-app
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
      - name: Set correct permissions
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && chmod -R 775 storage bootstrap/cache"

  maintenance-off:
    name: ✅ Disable Maintenance Mode
    runs-on: ubuntu-latest
    needs: fix-permissions
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}

      - name: Disable maintenance mode
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && php artisan up || true"

  verify-deployment:
    name: 🧪 Verify Deployment
    runs-on: ubuntu-latest
    needs: maintenance-off
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}

      - name: Confirm Laravel is responding
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && \
             php artisan --version && \
             echo '🚀 Deployment completed successfully!'"
