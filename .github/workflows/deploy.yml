name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure remote target directory exists
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "
            mkdir -p '${{ secrets.HOSTINGER_DIR }}'
            chown -R ${{ secrets.HOSTINGER_USER }}:'$(id -gn ${{ secrets.HOSTINGER_USER }})' '${{ secrets.HOSTINGER_DIR }}' || true
          "

      - name: Rsync files directly into target dir (overwrite, delete removed)
        run: |
          rsync -az --delete --exclude='.git' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DIR }}/

      - name: Run remote deployment commands (PHP 8.4)
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "
            set -e

            cd '${{ secrets.HOSTINGER_DIR }}'

            # Optional: put app into maintenance mode (best-effort)
            /opt/alt/php84/usr/bin/php artisan down --no-interaction || true

            # Install PHP dependencies and optimize autoloader
            /opt/alt/php84/usr/bin/php /usr/bin/composer install --no-dev --optimize-autoloader --no-interaction

            # Run database migrations
            /opt/alt/php84/usr/bin/php artisan migrate --force --no-interaction

            # Bring app back up
            /opt/alt/php84/usr/bin/php artisan up --no-interaction || true

            # Fix permissions for storage and cache
            chmod -R 775 storage bootstrap/cache || true
          "
