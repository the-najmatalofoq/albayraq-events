# D:\events\.github\workflows\deploy.yml
name: Deploy to Hostinger

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-connection:
    name: 🔌 Verify SSH Connection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}

      - name: Test SSH connection
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "echo '✅ SSH OK — host: $(hostname) — PHP: $(php -r \"echo PHP_VERSION;\")'"

  deploy:
    name: 🚀 Deploy Application
    runs-on: ubuntu-latest
    needs: verify-connection
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}

      - name: 🔄 Ensure remote directory exists
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "mkdir -p ${{ secrets.HOSTINGER_DIR }}"

      - name: 🔄 Sync project files
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="vendor" \
            --exclude=".env" \
            --exclude="storage/logs/*" \
            --exclude="tests" \
            --exclude="public_html" \
            --exclude="tmp_deploy" \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DIR }}

      - name: 🚧 Enable maintenance mode
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && php artisan down --retry=60 || true"

      - name: 📦 Install Composer dependencies
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && \
             composer install --no-dev --optimize-autoloader --no-interaction"

      - name: 🧱 Run database migrations
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && php artisan migrate --force"

      - name: ⚡ Clear and rebuild caches
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && \
             php artisan optimize:clear && \
             php artisan config:cache && \
             php artisan route:cache"

      - name: 🔐 Fix file permissions
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && \
             chmod -R 775 storage bootstrap/cache"

      - name: ✅ Disable maintenance mode
        if: always()
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && php artisan up || true"

      - name: 🧪 Verify deployment
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_DIR }} && \
             php artisan --version && \
             echo '🚀 Deployment completed successfully!'"
